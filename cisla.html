<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hry pro děti">
<meta name="theme-color" content="#f8f9fa">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Čísla</title>
<style>
* { box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
#game { padding: 16px; max-width: 720px; margin: 0 auto; }
#header { text-align: center; margin-bottom: 10px; }
#level-info { font-size: 15px; color: #666; margin-bottom: 4px; }
#score-info { font-size: 13px; color: #888; }
#msg { min-height: 28px; text-align: center; font-size: 16px; font-weight: 600; color: #333; margin-bottom: 10px; transition: color 0.3s; }
#progress-bar-wrap { height: 6px; border-radius: 4px; background: #e0e0e0; margin-bottom: 10px; overflow: hidden; }
#progress-bar { height: 100%; border-radius: 4px; background: #4caf50; transition: width 0.4s; width: 0%; }
#slots-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; min-height: 106px; }
#cards-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; min-height: 106px; }
.slot { width: 84px; height: 84px; border-radius: 14px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; transition: background 0.2s; overflow: visible; }
.slot svg.outline { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; opacity: 0.25; transition: opacity 0.2s; }
.slot.over svg.outline { opacity: 0.6; }
.slot.filled svg.outline { display: none; }
.slot .filled-num { font-size: 38px; font-weight: 900; display: none; }
.slot.filled .filled-num { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
.card { width: 84px; height: 84px; border-radius: 14px; border: 4px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 900; cursor: grab; transition: transform 0.15s, opacity 0.2s; }
.card:active { cursor: grabbing; transform: scale(1.12); }
.card.dragging { opacity: 0.45; transform: scale(1.08); }
.card.placed { opacity: 0; pointer-events: none; width: 0; height: 0; margin: 0; padding: 0; overflow: hidden; }
.card.wrong-shake { animation: shake 0.35s; }
@keyframes shake { 0%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} 100%{transform:translateX(0)} }
#btn-row { text-align: center; margin-top: 14px; }
button { padding: 8px 22px; border-radius: 8px; border: 1.5px solid #ccc; background: #fff; color: #333; font-size: 14px; cursor: pointer; }
button:hover { background: #f0f0f0; }
#confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

/* ===== RESPONSIVE + CENTROVÁNÍ ===== */
html { display: flex; justify-content: center; }
body { width: 100%; max-width: 720px; }
@media (max-width: 380px) {
  .slot, .card { width: 65px !important; height: 65px !important; font-size: 31px !important; }
  #slots-area, #cards-area { gap: 6px !important; }
  #msg { font-size: 13px !important; }
}
@media (min-width: 600px) {
  .slot, .card { width: 103px !important; height: 103px !important; font-size: 46px !important; }
  #slots-area, #cards-area { gap: 12px !important; }
}
@media (min-width: 768px) {
  .slot, .card { width: 120px !important; height: 120px !important; font-size: 53px !important; }
  #slots-area, #cards-area { gap: 14px !important; }
  #game { max-width: 680px !important; margin: 0 auto !important; }
}
@media (orientation: landscape) and (max-height: 500px) {
  .slot, .card { width: 62px !important; height: 62px !important; font-size: 29px !important; }
  #slots-area { margin-bottom: 8px !important; }
}

/* ===== CENTROVÁNÍ NA STŘED ===== */
html, body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#game {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#slots-area, #cards-area, #header, #btn-row {
  width: 100%;
  justify-content: center;
}
</style>
</head>
<body>
<div id="game">
  <div id="header">
    <div id="level-info">Úroveň <span id="lv">1</span> / 11</div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="score-info">Správně: <span id="sc">0</span></div>
  </div>
  <div id="msg">Přetáhni číslo <strong id="target-lbl">1</strong> na správné místo!</div>
  <div id="slots-area"></div>
  <div id="cards-area"></div>
  <div id="btn-row"><button id="restart-btn">Začít znovu</button></div>
</div>
<canvas id="confetti-canvas"></canvas>

<script>

// Detekce rozlišení a přizpůsobení
(function() {
  var w = window.innerWidth, h = window.innerHeight;
  document.documentElement.setAttribute('data-w', w < 380 ? 'xs' : w < 480 ? 'sm' : w < 600 ? 'md' : w < 768 ? 'lg' : 'xl');
  window.addEventListener('resize', function() {
    var nw = window.innerWidth;
    document.documentElement.setAttribute('data-w', nw < 380 ? 'xs' : nw < 480 ? 'sm' : nw < 600 ? 'md' : nw < 768 ? 'lg' : 'xl');
  });
})();

const COLORS = [
  {bg:'#FF6B6B',border:'#C0392B',text:'#fff'},
  {bg:'#FF9F43',border:'#E67E22',text:'#fff'},
  {bg:'#F4D03F',border:'#B7950B',text:'#5a3e00'},
  {bg:'#58D68D',border:'#1E8449',text:'#0b3d1e'},
  {bg:'#5DADE2',border:'#1A5276',text:'#fff'},
  {bg:'#A569BD',border:'#6C3483',text:'#fff'},
  {bg:'#F1948A',border:'#A93226',text:'#fff'},
  {bg:'#45B39D',border:'#0E6655',text:'#fff'},
  {bg:'#F5B041',border:'#9A7D0A',text:'#5a3e00'},
  {bg:'#85C1E9',border:'#1F618D',text:'#0d2b44'},
];

function digitSVG(n, color) {
  return `<svg class="outline" viewBox="0 0 60 70" xmlns="http://www.w3.org/2000/svg">
    <text x="5" y="62" font-size="66" font-weight="900" fill="none" stroke="${color}" stroke-width="3" font-family="Arial Black, Arial, sans-serif">${n}</text>
  </svg>`;
}

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
// Odemkni AudioContext při prvním dotyku/kliku
function unlockAudio() {
  getACtx();
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('mousedown', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('mousedown', unlockAudio, {once:true});

function playTones(freqs, type, vol) {
  try {
    const ctx = getACtx();
    if (ctx.state !== 'running') return;
    const t = ctx.currentTime;
    freqs.forEach(([freq, delay, dur]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t+delay);
      g.gain.linearRampToValueAtTime(vol, t+delay+0.04);
      g.gain.linearRampToValueAtTime(0, t+delay+dur);
      o.start(t+delay); o.stop(t+delay+dur+0.05);
    });
  } catch(e) {}
}
function playCorrect() { playTones([[523,0,.2],[659,.08,.2],[784,.16,.2],[1046,.24,.2]],'sine',.18); }
function playWrong()   { playTones([[220,0,.2],[185,.13,.2]],'sawtooth',.22); }
function playWin()     { playTones([[523,0,.32],[659,.1,.32],[784,.2,.32],[880,.3,.32],[1046,.4,.32],[1318,.5,.32]],'sine',.22); }
function showFlash(type) {
  const el = document.getElementById('flash');
  el.textContent = type === 'correct' ? '✓' : type === 'wrong' ? '✗' : '🏆';
  el.style.color  = type === 'correct' ? '#27ae60' : type === 'wrong' ? '#e74c3c' : '#f39c12';
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%,-50%) scale(1.1)';
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%,-50%) scale(0.8)';
  }, 900);
}

let level = 1, score = 0, dragCard = null, touchCard = null, ghostEl = null;

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function updateMsg() {
  const m = document.getElementById('msg');
  m.style.color = '#333';
  if (level <= 10) m.innerHTML = 'Přetáhni číslo <strong>' + level + '</strong> na správné místo!';
  else m.innerHTML = 'Finální výzva — seřaď všechna čísla <strong>1–10</strong>!';
}

function setMsg(html, color) {
  const m = document.getElementById('msg');
  m.innerHTML = html; m.style.color = color;
  setTimeout(() => updateMsg(), 1400);
}

function buildLevel() {
  document.getElementById('slots-area').innerHTML = '';
  document.getElementById('cards-area').innerHTML = '';
  document.getElementById('lv').textContent = level;
  document.getElementById('progress-bar').style.width = ((level-1)/11*100) + '%';
  updateMsg();

  const nums = level <= 10
    ? Array.from({length: level}, (_, i) => i+1)
    : Array.from({length: 10}, (_, i) => i+1);
  const shuffled = shuffle([...nums]);

  nums.forEach(n => {
    const c = COLORS[n-1];
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.num = n;
    slot.style.border = '2.5px dashed ' + c.border;
    slot.innerHTML = digitSVG(n, c.border) +
      `<span class="filled-num" style="color:${c.text}"></span>`;
    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('over'));
    slot.addEventListener('drop', e => { e.preventDefault(); handleDrop(slot); });
    document.getElementById('slots-area').appendChild(slot);
  });

  shuffled.forEach(n => {
    const c = COLORS[n-1];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.num = n;
    card.draggable = true;
    card.style.background = c.bg;
    card.style.borderColor = c.border;
    card.style.color = c.text;
    card.textContent = n;
    card.addEventListener('dragstart', () => { dragCard = card; card.classList.add('dragging'); });
    card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragCard = null; });
    card.addEventListener('touchstart', onTouchStart, {passive:false});
    card.addEventListener('touchmove', onTouchMove, {passive:false});
    card.addEventListener('touchend', onTouchEnd, {passive:false});
    document.getElementById('cards-area').appendChild(card);
  });
}

function handleDrop(slot) {
  slot.classList.remove('over');
  if (!dragCard) return;
  checkPlace(dragCard, slot);
}

function checkPlace(card, slot) {
  slot.classList.remove('over');
  if (card.dataset.num === slot.dataset.num) {
    const n = parseInt(card.dataset.num), c = COLORS[n-1];
    slot.classList.add('filled');
    slot.style.background = c.bg;
    slot.style.borderStyle = 'solid';
    slot.querySelector('.filled-num').textContent = n;
    card.classList.add('placed');
    score++;
    document.getElementById('sc').textContent = score;
    playCorrect(); showFlash("correct");
    if (!document.querySelector('.card:not(.placed)')) setTimeout(nextLevel, 500);
    else setMsg('✓ Správně!', '#27ae60');
  } else {
    playWrong();   showFlash("wrong");
    card.classList.remove('wrong-shake');
    void card.offsetWidth;
    card.classList.add('wrong-shake');
    setTimeout(() => card.classList.remove('wrong-shake'), 400);
    setMsg('✗ Zkus jiné místo!', '#e74c3c');
  }
}

function nextLevel() {
  if (level >= 11) {
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('msg').innerHTML = '🏆 Imperátor je hrdý! Všechna čísla pokořena!';
    document.getElementById('msg').style.color = '#e67e22';
    playWin(); showFlash("win"); launchConfetti(); return;
  }
  level++; buildLevel();
}

function onTouchStart(e) {
  e.preventDefault();
  touchCard = e.currentTarget;
  const t = e.touches[0];
  ghostEl = touchCard.cloneNode(true);
  ghostEl.style.cssText = `position:fixed;width:${touchCard.offsetWidth}px;height:${touchCard.offsetHeight}px;opacity:0.82;z-index:9999;pointer-events:none;border-radius:12px;font-size:38px;font-weight:900;display:flex;align-items:center;justify-content:center;left:${t.clientX-touchCard.offsetWidth/2}px;top:${t.clientY-touchCard.offsetHeight/2}px;background:${touchCard.style.background};border:3px solid ${touchCard.style.borderColor};color:${touchCard.style.color};`;
  document.body.appendChild(ghostEl);
  touchCard.classList.add('dragging');
}

function onTouchMove(e) {
  e.preventDefault();
  if (!ghostEl) return;
  const t = e.touches[0];
  ghostEl.style.left = (t.clientX - touchCard.offsetWidth/2) + 'px';
  ghostEl.style.top = (t.clientY - touchCard.offsetHeight/2) + 'px';
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('over'));
  const slot = document.elementsFromPoint(t.clientX, t.clientY).find(el => el.classList && el.classList.contains('slot'));
  if (slot) slot.classList.add('over');
}

function onTouchEnd(e) {
  e.preventDefault();
  if (ghostEl) { ghostEl.remove(); ghostEl = null; }
  if (!touchCard) return;
  touchCard.classList.remove('dragging');
  const t = e.changedTouches[0];
  const slot = document.elementsFromPoint(t.clientX, t.clientY).find(el => el.classList && el.classList.contains('slot'));
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('over'));
  if (slot) checkPlace(touchCard, slot);
  touchCard = null;
}

document.getElementById('restart-btn').addEventListener('click', () => {
  level = 1; score = 0; document.getElementById('sc').textContent = 0; buildLevel();
});

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = Array.from({length:160}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*-canvas.height,
    r: Math.random()*9+4, c: COLORS[Math.floor(Math.random()*10)].bg,
    s: Math.random()*3.5+1, a: Math.random()*Math.PI*2, spin: Math.random()*0.18-0.09
  }));
  let frame = 0;
  (function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r); ctx.restore();
      p.y+=p.s; p.a+=p.spin;
    });
    if (++frame < 260) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

buildLevel();
</script>
<div id="flash" style="
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  font-size:120px;line-height:1;
  opacity:0;
  transition:opacity 0.15s ease, transform 0.15s ease;
  pointer-events:none;z-index:9998;
  text-shadow:0 4px 24px rgba(0,0,0,0.18);
"></div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
