<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hry pro děti">
<meta name="theme-color" content="#f8f9fa">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barvy</title>
<style>
* { box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
#game { padding: 16px; max-width: 720px; margin: 0 auto; }
#header { text-align: center; margin-bottom: 10px; }
#level-info { font-size: 15px; color: #666; margin-bottom: 4px; }
#score-info { font-size: 13px; color: #888; }
#msg { min-height: 28px; text-align: center; font-size: 16px; font-weight: 600; color: #333; margin-bottom: 10px; transition: color 0.3s; }
#progress-bar-wrap { height: 6px; border-radius: 4px; background: #e0e0e0; margin-bottom: 10px; overflow: hidden; }
#progress-bar { height: 100%; border-radius: 4px; background: #4caf50; transition: width 0.4s; width: 0%; }
#slots-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; min-height: 90px; }
#cards-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; min-height: 90px; }
.slot {
  width: 72px; height: 72px; border-radius: 50%;
  background: #e8e8e8;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  transition: background 0.25s, transform 0.15s;
  border: 5px solid transparent;
}
.slot.over { transform: scale(1.1); }
.slot.filled { border-color: transparent !important; }
.slot .ghost-circle {
  width: 100%; height: 100%; border-radius: 50%;
  position: absolute; top: 0; left: 0;
  transition: opacity 0.2s;
}
.slot.filled .ghost-circle { display: none; }
.slot.over .ghost-circle { opacity: 1 !important; }
.card {
  width: 72px; height: 72px; border-radius: 50%;
  border: 4px solid transparent;
  cursor: grab;
  transition: transform 0.15s, opacity 0.2s, box-shadow 0.15s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.18);
}
.card:active { cursor: grabbing; transform: scale(1.12); }
.card.dragging { opacity: 0.45; transform: scale(1.1); }
.card.placed { opacity: 0; pointer-events: none; width: 0; height: 0; margin: 0; padding: 0; overflow: hidden; }
.card.wrong-shake { animation: shake 0.35s; }
@keyframes shake { 0%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} 100%{transform:translateX(0)} }
#btn-row { text-align: center; margin-top: 14px; }
button { padding: 8px 22px; border-radius: 8px; border: 1.5px solid #ccc; background: #fff; color: #333; font-size: 14px; cursor: pointer; }
button:hover { background: #f0f0f0; }
#confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
</style>
</head>
<body>
<div id="game">
  <div id="header">
    <div id="level-info">Úroveň <span id="lv">1</span> / 11</div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="score-info">Správně: <span id="sc">0</span></div>
  </div>
  <div id="msg"></div>
  <div id="slots-area"></div>
  <div id="cards-area"></div>
  <div id="btn-row"><button id="restart-btn">Začít znovu</button></div>
</div>
<canvas id="confetti-canvas"></canvas>

<script>
// 10 maximally distinct colors for toddlers — no similar pairs
// red, yellow, blue, green, purple, orange→replaced by hot pink, brown→replaced by black, white-ish→replaced by sky, teal→replaced by lime, grey stays
const COLORS = [
  { id:1,  bg:'#E63946', border:'#9B1B26', name:'Červená'   },  // vivid red
  { id:2,  bg:'#F9C80E', border:'#B5900A', name:'Žlutá'     },  // strong yellow — far from red
  { id:3,  bg:'#1565C0', border:'#0D3D73', name:'Modrá'     },  // deep blue — far from green
  { id:4,  bg:'#2E7D32', border:'#1B4F20', name:'Zelená'    },  // forest green
  { id:5,  bg:'#7B1FA2', border:'#4A0D63', name:'Fialová'   },  // deep purple
  { id:6,  bg:'#FF69B4', border:'#C2185B', name:'Růžová'    },  // hot pink — clearly diff from red
  { id:7,  bg:'#212121', border:'#000000', name:'Černá'     },  // black
  { id:8,  bg:'#FF6F00', border:'#BF4600', name:'Oranžová'  },  // orange — placed far from red in sequence
  { id:9,  bg:'#00ACC1', border:'#006978', name:'Tyrkysová' },  // cyan/teal — placed far from green in sequence
  { id:10, bg:'#78909C', border:'#37474F', name:'Šedá'      },  // blue-grey
];

function hexRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function playCorrect() {}
function playWrong()   {}
function playWin()     {}
function showFlash(type) {
  const el = document.getElementById('flash');
  el.textContent = type === 'correct' ? '✓' : type === 'wrong' ? '✗' : '🏆';
  el.style.color  = type === 'correct' ? '#27ae60' : type === 'wrong' ? '#e74c3c' : '#f39c12';
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%,-50%) scale(1.1)';
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%,-50%) scale(0.8)';
  }, 900);
}

let level=1, score=0, dragCard=null, touchCard=null, ghostEl=null;

function shuffle(arr) { return arr.sort(()=>Math.random()-0.5); }

function updateMsg() {
  const m = document.getElementById('msg');
  m.style.color = '#333';
  if (level <= 10) {
    const c = COLORS[level-1];
    m.innerHTML = 'Přetáhni <span style="color:'+c.bg+';-webkit-text-stroke:0.5px '+c.border+';font-weight:800;">'+c.name+'</span> na správné místo!';
  } else {
    m.innerHTML = 'Finální výzva — seřaď <strong>všechny barvy</strong>!';
  }
}

function setMsg(html, color) {
  const m = document.getElementById('msg');
  m.innerHTML = html; m.style.color = color;
  setTimeout(() => updateMsg(), 1500);
}

function buildLevel() {
  document.getElementById('slots-area').innerHTML = '';
  document.getElementById('cards-area').innerHTML = '';
  document.getElementById('lv').textContent = level;
  document.getElementById('progress-bar').style.width = ((level-1)/11*100)+'%';
  updateMsg();

  const nums = level <= 10
    ? Array.from({length:level},(_,i)=>i+1)
    : Array.from({length:10},(_,i)=>i+1);
  const shuffled = shuffle([...nums]);

  nums.forEach(n => {
    const c = COLORS[n-1];
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.num = n;
    slot.style.borderColor = c.border;
    const ghost = document.createElement('div');
    ghost.className = 'ghost-circle';
    ghost.style.background = hexRgba(c.bg, 0.40);
    slot.appendChild(ghost);
    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('over'));
    slot.addEventListener('drop', e => { e.preventDefault(); handleDrop(slot); });
    document.getElementById('slots-area').appendChild(slot);
  });

  shuffled.forEach(n => {
    const c = COLORS[n-1];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.num = n;
    card.draggable = true;
    card.style.background = c.bg;
    card.style.borderColor = c.border;
    card.addEventListener('dragstart', () => { dragCard = card; card.classList.add('dragging'); });
    card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragCard = null; });
    card.addEventListener('touchstart', onTouchStart, {passive:false});
    card.addEventListener('touchmove', onTouchMove, {passive:false});
    card.addEventListener('touchend', onTouchEnd, {passive:false});
    document.getElementById('cards-area').appendChild(card);
  });
}

function handleDrop(slot) {
  slot.classList.remove('over');
  if (!dragCard) return;
  checkPlace(dragCard, slot);
}

function checkPlace(card, slot) {
  slot.classList.remove('over');
  if (card.dataset.num === slot.dataset.num) {
    const n = parseInt(card.dataset.num), c = COLORS[n-1];
    slot.classList.add('filled');
    slot.style.background = c.bg;
    slot.style.borderColor = c.border;
    card.classList.add('placed');
    score++;
    document.getElementById('sc').textContent = score;
    playCorrect(); showFlash("correct");
    if (!document.querySelector('.card:not(.placed)')) setTimeout(nextLevel, 500);
    else setMsg('✓ <span style="color:'+c.bg+';-webkit-text-stroke:0.5px '+c.border+'">'+c.name+'</span> — správně!', '#27ae60');
  } else {
    playWrong();   showFlash("wrong");
    card.classList.remove('wrong-shake');
    void card.offsetWidth;
    card.classList.add('wrong-shake');
    setTimeout(() => card.classList.remove('wrong-shake'), 400);
    setMsg('✗ Zkus jiné místo!', '#e74c3c');
  }
}

function nextLevel() {
  if (level >= 11) {
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('msg').innerHTML = '🏆 Výborně! Všechny barvy na svém místě!';
    document.getElementById('msg').style.color = '#e67e22';
    playWin(); showFlash("win"); launchConfetti(); return;
  }
  level++; buildLevel();
}

function onTouchStart(e) {
  e.preventDefault();
  touchCard = e.currentTarget;
  const t = e.touches[0];
  ghostEl = document.createElement('div');
  ghostEl.style.cssText = `position:fixed;width:${touchCard.offsetWidth}px;height:${touchCard.offsetHeight}px;border-radius:50%;opacity:0.85;z-index:9999;pointer-events:none;background:${touchCard.style.background};border:4px solid ${touchCard.style.borderColor};box-shadow:0 4px 14px rgba(0,0,0,0.25);left:${t.clientX-touchCard.offsetWidth/2}px;top:${t.clientY-touchCard.offsetHeight/2}px;`;
  document.body.appendChild(ghostEl);
  touchCard.classList.add('dragging');
}

function onTouchMove(e) {
  e.preventDefault();
  if (!ghostEl) return;
  const t = e.touches[0];
  ghostEl.style.left = (t.clientX - touchCard.offsetWidth/2)+'px';
  ghostEl.style.top  = (t.clientY - touchCard.offsetHeight/2)+'px';
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('over'));
  const slot = document.elementsFromPoint(t.clientX, t.clientY).find(el => el.classList && el.classList.contains('slot'));
  if (slot) slot.classList.add('over');
}

function onTouchEnd(e) {
  e.preventDefault();
  if (ghostEl) { ghostEl.remove(); ghostEl = null; }
  if (!touchCard) return;
  touchCard.classList.remove('dragging');
  const t = e.changedTouches[0];
  const slot = document.elementsFromPoint(t.clientX, t.clientY).find(el => el.classList && el.classList.contains('slot'));
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('over'));
  if (slot) checkPlace(touchCard, slot);
  touchCard = null;
}

document.getElementById('restart-btn').addEventListener('click', () => {
  level=1; score=0; document.getElementById('sc').textContent=0; buildLevel();
});

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = Array.from({length:180}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*-canvas.height,
    r: Math.random()*10+4,
    c: COLORS[Math.floor(Math.random()*10)].bg,
    s: Math.random()*3.5+1, a: Math.random()*Math.PI*2,
    spin: Math.random()*0.2-0.1
  }));
  let frame=0;
  (function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      ctx.restore(); p.y+=p.s; p.a+=p.spin;
    });
    if (++frame<260) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

buildLevel();
</script>
<div id="flash" style="
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  font-size:120px;line-height:1;
  opacity:0;
  transition:opacity 0.15s ease, transform 0.15s ease;
  pointer-events:none;z-index:9998;
  text-shadow:0 4px 24px rgba(0,0,0,0.18);
"></div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
